services:
  - type: web
    name: vocaresume
    env: python
  # Pure pip install; avoid apt-get on free tier. If poppler needed, use a separate service with system packages or pre-bake container.
  buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PORT
        value: 8501
      - key: DISABLE_OFFLINE_TTS
        value: "1"
      - key: VOICE_DEBUG
        value: "0"
      - key: VOSK_SKIP_DL
        value: "0"
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PPLX_API_KEY
        sync: false
    healthCheckPath: /
